<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedido de Compras - Kway</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }
    .container {
      max-width: 860px;
      margin: 32px auto;
      background: #fff;
      padding: 28px;
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .subtitle {
      margin: 0 0 24px;
      color: #6b7280;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .full {
      grid-column: 1 / -1;
    }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 14px;
    }
    input, select, textarea, button {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
    }
    button {
      border: none;
      cursor: pointer;
      font-weight: 700;
      background: #111827;
      color: #fff;
      margin-top: 8px;
    }
    button:disabled {
      opacity: .7;
      cursor: wait;
    }
    .message {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-size: 14px;
    }
    .success {
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }
    .error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    .required {
      color: #b91c1c;
    }
    .hint {
      font-size: 12px;
      color: #6b7280;
      margin-top: 4px;
    }
    @media (max-width: 720px) {
      .container { margin: 12px; padding: 18px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pedido de Compras</h1>
    <p class="subtitle">Preencha os dados abaixo para registrar a solicitação.</p>

    <form id="purchaseForm">
      <div class="grid">
        <div>
          <label for="solicitante">Nome do solicitante <span class="required">*</span></label>
          <input type="text" id="solicitante" name="solicitante" required />
        </div>

        <div>
          <label for="emailSolicitante">E-mail do solicitante</label>
          <input type="email" id="emailSolicitante" name="emailSolicitante" />
        </div>

        <div>
          <label for="setor">Setor <span class="required">*</span></label>
          <input type="text" id="setor" name="setor" required />
        </div>

        <div>
          <label for="gestor">Gestor responsável</label>
          <input type="text" id="gestor" name="gestor" />
        </div>

        <div class="full">
          <label for="item">Item / serviço solicitado <span class="required">*</span></label>
          <input type="text" id="item" name="item" required />
        </div>

        <div>
          <label for="categoria">Categoria <span class="required">*</span></label>
          <select id="categoria" name="categoria" required>
            <option value="">Selecione</option>
            <option>Material de escritório</option>
            <option>Equipamentos</option>
            <option>Uniforme / EPI</option>
            <option>Serviço</option>
            <option>Manutenção</option>
            <option>Tecnologia</option>
            <option>Outros</option>
          </select>
        </div>

        <div>
          <label for="quantidade">Quantidade <span class="required">*</span></label>
          <input type="number" id="quantidade" name="quantidade" min="1" required />
        </div>

        <div>
          <label for="valorEstimado">Valor estimado (R$)</label>
          <input type="number" id="valorEstimado" name="valorEstimado" min="0" step="0.01" />
        </div>

        <div>
          <label for="urgencia">Urgência <span class="required">*</span></label>
          <select id="urgencia" name="urgencia" required>
            <option value="">Selecione</option>
            <option>Baixa</option>
            <option>Média</option>
            <option>Alta</option>
          </select>
        </div>

        <div class="full">
          <label for="justificativa">Justificativa da compra <span class="required">*</span></label>
          <textarea id="justificativa" name="justificativa" required></textarea>
          <div class="hint">Explique de forma objetiva a necessidade da compra.</div>
        </div>

        <div class="full">
          <label for="observacoes">Observações</label>
          <textarea id="observacoes" name="observacoes"></textarea>
        </div>

        <div class="full">
          <button type="submit" id="submitBtn">Enviar pedido</button>
        </div>
      </div>
    </form>

    <div id="successMessage" class="message success">
      Pedido enviado com sucesso.
    </div>

    <div id="errorMessage" class="message error">
      Não foi possível enviar o pedido. Verifique a conexão ou a configuração do script.
    </div>
  </div>

  <script>
    // COLE AQUI A URL DO WEB APP DO GOOGLE APPS SCRIPT
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyXXMR0CY-UxdEKvrOOgVcyK2sEItEJXHTXNw8lGS1rD2YWD86K4i_lnCFYdSiZnYrytQ/exec";

    const form = document.getElementById("purchaseForm");
    const submitBtn = document.getElementById("submitBtn");
    const successMessage = document.getElementById("successMessage");
    const errorMessage = document.getElementById("errorMessage");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      successMessage.style.display = "none";
      errorMessage.style.display = "none";

      if (SCRIPT_URL.includes("COLE_AQUI")) {
        errorMessage.textContent = "Configure a URL do Google Apps Script no arquivo HTML antes de publicar.";
        errorMessage.style.display = "block";
        return;
      }

      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());

      submitBtn.disabled = true;
      submitBtn.textContent = "Enviando...";

      try {
        const response = await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "cors",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.success) {
          form.reset();
          successMessage.style.display = "block";
        } else {
          throw new Error(result.message || "Falha ao enviar.");
        }
      } catch (error) {
        console.error(error);
        errorMessage.style.display = "block";
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Enviar pedido";
      }
    });
  </script>
</body>
</html>
